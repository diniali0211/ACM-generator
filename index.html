<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f5f5;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    border: 1px solid #e5e5e5;
    padding: 36px;
    width: 100%;
    max-width: 580px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }
  .logo-icon {
    width: 40px; height: 40px;
    background: #1a56db;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 22px; height: 22px; fill: none; stroke: #fff; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .logo-text h1 { font-size: 17px; font-weight: 600; color: #1a1a1a; }
  .logo-text p  { font-size: 13px; color: #6b7280; margin-top: 2px; }

  .drop-zone {
    border: 2px dashed #d1d5db;
    border-radius: 12px;
    padding: 40px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 20px;
  }
  .drop-zone:hover, .drop-zone.dragover { border-color: #1a56db; background: #eff6ff; }
  .drop-zone svg { width: 36px; height: 36px; stroke: #9ca3af; margin-bottom: 12px; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; display: block; margin: 0 auto 12px; }
  .drop-zone h2 { font-size: 15px; font-weight: 500; color: #374151; margin-bottom: 4px; }
  .drop-zone p  { font-size: 13px; color: #9ca3af; }
  .drop-zone input { display: none; }

  .file-info {
    display: none;
    align-items: center;
    gap: 10px;
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 13px;
  }
  .file-info svg { width: 18px; height: 18px; stroke: #059669; flex-shrink: 0; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .file-info .fname { color: #374151; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-info .fsize { color: #9ca3af; flex-shrink: 0; }

  .stats {
    display: none;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat {
    background: #f9fafb;
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .stat .label { font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
  .stat .value { font-size: 20px; font-weight: 600; color: #1a1a1a; }
  .stat .value.sm { font-size: 13px; font-weight: 500; }

  .status {
    display: none;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    padding: 12px 16px;
    border-radius: 10px;
    margin-bottom: 16px;
  }
  .status.loading { background: #eff6ff; color: #1d4ed8; }
  .status.success { background: #ecfdf5; color: #065f46; }
  .status.error   { background: #fef2f2; color: #991b1b; }
  .status svg { width: 16px; height: 16px; flex-shrink: 0; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 0.8s linear infinite; }

  .btn-download {
    display: none;
    width: 100%;
    padding: 13px;
    background: #1a56db;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s;
  }
  .btn-download:hover { background: #1e40af; }
  .btn-download svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .footer {
    margin-top: 32px;
    font-size: 12px;
    color: #9ca3af;
    text-align: center;
    border-top: 1px solid #f0f0f0;
    padding-top: 20px;
  }

  @media (max-width: 480px) {
    .card { padding: 24px 18px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="card">

  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/></svg>
    </div>
    <div class="logo-text">
      <h1>ACM</h1>
      <p>Alliance Contract Manufacturing — HR Tools</p>
    </div>
  </div>

  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <svg viewBox="0 0 24 24"><polyline points="16,16 12,12 8,16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></svg>
    <h2>Click to upload or drag &amp; drop</h2>
    <p>OSADI Individual Attendance Report (.xls or .xlsx)</p>
    <input type="file" id="fileInput" accept=".xls,.xlsx">
  </div>

  <div class="file-info" id="fileInfo">
    <svg viewBox="0 0 24 24"><polyline points="20,6 9,17 4,12"/></svg>
    <span class="fname" id="fileName"></span>
    <span class="fsize" id="fileSize"></span>
  </div>

  <div class="status" id="statusBox">
    <svg id="statusIcon" viewBox="0 0 24 24"></svg>
    <span id="statusText"></span>
  </div>

  <div class="stats" id="statsGrid">
    <div class="stat"><div class="label">Employees</div><div class="value" id="sEmp">—</div></div>
    <div class="stat"><div class="label">Records</div><div class="value" id="sRec">—</div></div>
    <div class="stat"><div class="label">Date range</div><div class="value sm" id="sDates">—</div></div>
    <div class="stat"><div class="label">On leave</div><div class="value" id="sLeave">—</div></div>
  </div>

  <button class="btn-download" id="btnDownload" onclick="downloadFile()">
    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Download ACM file
  </button>

  <div class="footer">
    All processing happens in your browser — no data is uploaded to any server.
  </div>
</div>

<script>
let outputWb = null;
let parsedRecords = null;

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function setStatus(type, msg) {
  const box = document.getElementById('statusBox');
  const icon = document.getElementById('statusIcon');
  const text = document.getElementById('statusText');
  box.className = 'status ' + type;
  box.style.display = 'flex';
  text.textContent = msg;
  if (type === 'loading') {
    icon.innerHTML = '<circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/>';
    icon.classList.add('spin');
  } else if (type === 'success') {
    icon.innerHTML = '<polyline points="20,6 9,17 4,12"/>';
    icon.classList.remove('spin');
  } else {
    icon.innerHTML = '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>';
    icon.classList.remove('spin');
  }
}

function handleFile(file) {
  outputWb = null; parsedRecords = null;
  document.getElementById('statsGrid').style.display = 'none';
  document.getElementById('btnDownload').style.display = 'none';

  const info = document.getElementById('fileInfo');
  info.style.display = 'flex';
  document.getElementById('fileName').textContent = file.name;
  document.getElementById('fileSize').textContent = (file.size / 1024).toFixed(0) + ' KB';

  setStatus('loading', 'Reading file…');

  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = new Uint8Array(e.target.result);
      // Read WITHOUT cellDates so we get raw values — we handle date parsing ourselves
      const wb = XLSX.read(data, { type: 'array', cellDates: false, raw: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      // sheet_to_json with raw:true gives us unformatted cell values
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: true, defval: null });
      processRows(rows);
    } catch(err) {
      setStatus('error', 'Could not read file: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

// Excel serial date -> JS Date (Excel epoch is Jan 1 1900, but has leap year bug so offset by 2)
function excelSerialToDate(serial) {
  if (typeof serial !== 'number' || serial < 1) return null;
  const utc = (serial - 25569) * 86400 * 1000;
  return new Date(utc);
}

// Check if a value looks like an Excel date serial (dates in OSADI range: 2020-2030 = serials ~43831-48622)
function isDateSerial(val) {
  return typeof val === 'number' && val > 43000 && val < 55000 && Math.floor(val) !== val ||
         typeof val === 'number' && val > 43000 && val < 55000 && val === Math.floor(val);
}

// Check if serial is a date-only (integer) vs datetime (has fractional part)
function isDateOnly(val) {
  return typeof val === 'number' && val === Math.floor(val) && val > 43000 && val < 55000;
}

function serialToDateStr(val) {
  const d = excelSerialToDate(val);
  if (!d) return null;
  return d.getUTCFullYear() + '-' +
    String(d.getUTCMonth()+1).padStart(2,'0') + '-' +
    String(d.getUTCDate()).padStart(2,'0');
}

function serialToTimeStr(val) {
  if (typeof val !== 'number') return '';
  // fractional part is the time
  const frac = val - Math.floor(val);
  const totalSec = Math.round(frac * 86400);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

// For datetime serials (date + time fraction), extract just the time portion
function serialToDateTimeStr(val) {
  if (typeof val !== 'number') return { date: null, time: '' };
  const dateStr = serialToDateStr(Math.floor(val));
  const frac = val - Math.floor(val);
  const totalSec = Math.round(frac * 86400);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  const timeStr = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  return { date: dateStr, time: timeStr };
}

function parseTimeFromString(val) {
  if (!val) return '';
  const s = String(val);
  const m = s.match(/(\d{1,2}):(\d{2})(?::(\d{2}))?/);
  if (m) return m[1].padStart(2,'0')+':'+m[2]+':'+(m[3]||'00');
  return '';
}

function getDayAbbr(dateStr) {
  const d = new Date(dateStr + 'T00:00:00Z');
  return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getUTCDay()];
}

function getShfType(dayType, shift) {
  const dt = (dayType||'').toUpperCase();
  const s = (shift||'').toUpperCase();
  // Any PH-tagged day (PH, PH/OD, PH/RD, etc.) is labeled Holiday, checked before OD/RD
  if (dt === 'PH' || dt.startsWith('PH/')) return 'Holiday';
  // dayType can be compound, e.g. "XX/OD" or "XX/RD" — check by substring
  if (dt.includes('OD')) return 'Offday';
  if (dt.includes('RD')) return 'Restday';
  if (s.includes('NITE')||s.includes('NIGHT')||s.includes('N2')) return 'Night';
  return 'Morning';
}

function getLeave(code, dayType) {
  const c = String(code||'').trim().toUpperCase();
  const dt = String(dayType||'').trim().toUpperCase();
  if (c === 'NPL') return 'Unpaid Leave';
  if (c === 'AL') return 'Annual Leave';
  if (dt === 'ABS') return 'Absent';
  // dayType can be compound, e.g. "PH/OD" or "PH/RD" — treat any PH-tagged day as a public holiday
  if (dt === 'PH' || dt.includes('PH/') || dt.startsWith('PH')) return 'Public Holiday';
  // Unrecognized leave code — show it as-is instead of silently dropping it
  if (c) return c;
  return '';
}

function processRows(rows) {
  const records = [];
  let empNo = null, empName = null, empDept = null;

  for (let i = 0; i < rows.length; i++) {
    const row = rows[i];
    if (!row || row.length < 2) continue;

    const raw0 = row[0];
    const raw1 = row[1];
    const raw3 = row[3];
    const raw9 = row[9];
    const raw10 = row[10];
    const raw12 = row[12];
    const raw24 = row[24];
    const raw28 = row[28];
    const raw29 = row[29];
    const raw41 = row[41];

    // --- Detect employee header row ---
    // col0 is a small integer (emp number), col3 is a string name
    const s0 = raw0 !== null && raw0 !== undefined ? String(raw0).trim() : '';
    const isSmallInt = /^\d{3,6}$/.test(s0) && !isDateSerial(raw0);
    const hasName = raw3 && typeof raw3 === 'string' && raw3.trim().length > 2 && !/^\d+$/.test(raw3.trim());
    const isEmpRow = isSmallInt && hasName;

    // --- Detect data row ---
    // col0 is an Excel date serial (integer, in plausible date range)
    const isDateCol0 = isDateSerial(raw0);
    const dt = raw9 ? String(raw9).trim().toUpperCase() : '';
    // Accept any non-empty Day Type code (N, OD, RD, ABS, PH, PH/OD, PH/RD, etc.)
    // instead of a fixed whitelist, so no attendance day silently disappears.
    const isDataRow = isDateCol0 && dt.length > 0;

    if (isEmpRow) {
      empNo = s0;
      empName = String(raw3).trim();
      // col24 holds the department, e.g. "119904 MATERIALS-W/HOUSE & SHIPPING"
      empDept = raw24 ? String(raw24).trim() : '';
    } else if (isDataRow && empNo) {
      const dateStr = serialToDateStr(Math.floor(raw0));
      if (!dateStr) continue;

      const shift = raw1 ? String(raw1).trim() : '';
      const leaveCode = raw41 ? String(raw41).trim() : '';
      const hasLeave = leaveCode !== '' || dt === 'ABS';

      // Time in/out: these are datetime serials (date integer + time fraction)
      let timeIn = '', timeOut = '';
      if (!hasLeave) {
        if (typeof raw10 === 'number' && raw10 > 0) {
          timeIn = serialToTimeStr(raw10);
        } else if (raw10) {
          timeIn = parseTimeFromString(raw10);
        }
        if (typeof raw12 === 'number' && raw12 > 0) {
          timeOut = serialToTimeStr(raw12);
        } else if (raw12) {
          timeOut = parseTimeFromString(raw12);
        }
      }

      // OT minutes (col28 = OT1.5x, col29 = OT2.0x restday)
      let otMins = 0;
      if (raw28 && !isNaN(+raw28)) otMins += +raw28;
      if (raw29 && !isNaN(+raw29)) otMins += +raw29;
      const otH = (!hasLeave && otMins > 0)
        ? Math.floor(otMins/60).toString().padStart(2,'0')+':'+Math.round(otMins%60).toString().padStart(2,'0')+':00'
        : '';

      records.push({
        empNo, empName, empDept, dateStr,
        day: getDayAbbr(dateStr),
        leaveType: getLeave(leaveCode, dt),
        shfType: getShfType(dt, shift),
        timeIn, timeOut, otHours: otH
      });
    }
  }

  if (records.length === 0) {
    setStatus('error', 'No records found. Please check the file is an OSADI Individual Attendance Report and try again.');
    return;
  }

  // Stats
  const emps   = new Set(records.map(r=>r.empNo)).size;
  const dates  = records.map(r=>r.dateStr).sort();
  const leaves = records.filter(r=>r.leaveType).length;
  const from   = dates[0] ? dates[0].slice(5).replace('-','/') : '—';
  const to     = dates[dates.length-1] ? dates[dates.length-1].slice(5).replace('-','/') : '—';

  document.getElementById('sEmp').textContent   = emps;
  document.getElementById('sRec').textContent   = records.length;
  document.getElementById('sDates').textContent = from + ' – ' + to;
  document.getElementById('sLeave').textContent = leaves;
  document.getElementById('statsGrid').style.display = 'grid';

  buildWorkbook(records);
  parsedRecords = records;
  setStatus('success', records.length + ' records converted successfully. Ready to download.');
  document.getElementById('btnDownload').style.display = 'flex';
}

function buildWorkbook(records) {
  const headers = ['EMP ID','EMP NAME','Department','Date','Day','Lvetype','Shf.Type','In','Out','OT Hours'];
  const data = [headers, ...records.map(r=>[
    r.empNo, r.empName, r.empDept, r.dateStr, r.day,
    r.leaveType, r.shfType, r.timeIn, r.timeOut, r.otHours
  ])];
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{wch:12},{wch:32},{wch:36},{wch:14},{wch:6},{wch:18},{wch:14},{wch:12},{wch:12},{wch:12}];
  XLSX.utils.book_append_sheet(wb, ws, 'Data');
  outputWb = wb;
}

function downloadFile() {
  if (!outputWb || !parsedRecords) return;
  const dates = parsedRecords.map(r=>r.dateStr).sort();
  const from  = dates[0] ? dates[0].replace(/-/g,'') : 'FROM';
  const to    = dates[dates.length-1] ? dates[dates.length-1].replace(/-/g,'') : 'TO';
  XLSX.writeFile(outputWb, 'ATTENDANCE_ACM_' + from + '-' + to + '.xlsx');
}
</script>
</body>
</html>
